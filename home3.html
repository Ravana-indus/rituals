<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Heritage Curator | Minimal Edit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    /* Design Tokens as CSS Variables - Minimal Swiss Approach */
    :root {
      --color-brand-primary: #A44668;
      --color-brand-primary-hover: #8C3955;
      --color-brand-secondary: #D4A574;
      --color-surface-base: #FEFCFA;
      --color-surface-raised: #F7F4F0;
      --color-surface-muted: #EFEAE4;
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #5C5347;
      --color-text-tertiary: #8A8078;
      --color-border-default: #E8E3DD;
      --color-icon-secondary: #8A8078;
      --color-semantic-success: #1B7A4E;
      
      --font-family-display: "Playfair Display", Georgia, serif;
      --font-family-primary: "Inter", -apple-system, "Segoe UI", sans-serif;
      
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 32px;
      --space-8: 40px;
      --space-9: 48px;
      --space-10: 64px;
      
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      
      --shadow-sm: 0 1px 2px rgba(26, 26, 26, 0.05);
      --shadow-md: 0 2px 8px rgba(26, 26, 26, 0.08);
      --shadow-lg: 0 4px 16px rgba(26, 26, 26, 0.1);
      
      --motion-duration-fast: 150ms;
      --motion-easing-default: cubic-bezier(0.2, 0, 0, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font-family-primary);
      background-color: var(--color-surface-base);
      color: var(--color-text-primary);
      line-height: 1.5;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: var(--color-surface-base);
      border-bottom: 1px solid var(--color-border-default);
      height: 64px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--space-6);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-6);
    }

    .logo {
      font-family: var(--font-family-display);
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--color-text-primary);
      text-decoration: none;
      white-space: nowrap;
    }

    .search-container {
      flex: 1;
      max-width: 400px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: var(--space-4);
      color: var(--color-icon-secondary);
      font-size: 20px;
    }

    .search-input {
      width: 100%;
      height: 44px;
      padding: 0 var(--space-4) 0 var(--space-10);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-full);
      background-color: var(--color-surface-raised);
      font-family: var(--font-family-primary);
      font-size: 0.875rem;
      color: var(--color-text-primary);
      transition: border-color var(--motion-duration-fast) var(--motion-easing-default),
                  box-shadow var(--motion-duration-fast) var(--motion-easing-default);
    }

    .search-input::placeholder {
      color: var(--color-text-tertiary);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--color-brand-primary);
      box-shadow: 0 0 0 3px rgba(164, 70, 104, 0.15);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    .icon-btn {
      position: relative;
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--space-2);
      color: var(--color-text-primary);
      transition: color var(--motion-duration-fast) var(--motion-easing-default);
    }

    .icon-btn:hover {
      color: var(--color-brand-primary);
    }

    .icon-btn .material-symbols-outlined {
      font-size: 24px;
    }

    .cart-count {
      position: absolute;
      top: 0;
      right: 0;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      background-color: var(--color-brand-primary);
      color: var(--color-surface-base);
      font-size: 10px;
      font-weight: 700;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Delivery Zone */
    .delivery-zone {
      max-width: 1280px;
      margin: 0 auto;
      padding: var(--space-3) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 0.875rem;
      color: var(--color-text-tertiary);
    }

    .delivery-zone .location-icon {
      font-size: 18px;
      color: var(--color-icon-secondary);
    }

    .delivery-zone strong {
      font-weight: 500;
      color: var(--color-text-secondary);
    }
  </style>
</head>
<body>
  <!-- Minimal Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">The Heritage Curator</a>
      <div class="search-container">
        <span class="material-symbols-outlined search-icon">search</span>
        <input type="text" class="search-input" placeholder="Search brands, skincare, makeup" aria-label="Search products">
      </div>
      <div class="header-actions">
        <button class="icon-btn" aria-label="Cart">
          <span class="material-symbols-outlined">shopping_bag</span>
          <span class="cart-count">2</span>
        </button>
      </div>
    </div>
  </header>
  <div class="delivery-zone">
    <span class="material-symbols-outlined location-icon">location_on</span>
    <span class="zone-text">Deliver to: <strong>Colombo 03</strong></span>
  </div>
  <!-- Content will be added in subsequent tasks -->
</body>
</html>
